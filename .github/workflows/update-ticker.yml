name: Update PSX ticker

on:
  schedule:
    # Every 15 minutes during PSX trading hours (Mon-Fri, ~9:30-15:30 PKT = 04:30-10:30 UTC)
    - cron: '*/15 4-10 * * 1-5'
  workflow_dispatch:

permissions:
  contents: write

concurrency:
  group: update-ticker
  cancel-in-progress: false

jobs:
  update:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Fetch latest PSX data
        run: node scripts/update-ticker.mjs

      - name: Commit ticker.json if changed
        run: |
          if git diff --quiet -- ticker.json; then
            echo "No changes."
            exit 0
          fi
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add ticker.json
          git commit -m "chore: refresh PSX ticker data"
          git push
