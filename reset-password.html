<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Reset Password — Haseeb Zahid</title>
  <meta name="robots" content="noindex">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@600;700&family=Sora:wght@400;500;600;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="style.css">
  <style>
    .reset-wrap {
      min-height: 100vh;
      display: flex; align-items: center; justify-content: center;
      padding: 6rem 1.5rem 4rem;
    }
    .reset-card {
      width: 100%; max-width: 440px;
      background: linear-gradient(140deg, rgba(255,250,240,0.85), rgba(237,225,203,0.7));
      border: 1px solid var(--border);
      border-radius: 14px;
      padding: 2.4rem 2rem;
    }
    .reset-card h1 {
      font-family: 'Playfair Display', serif;
      font-size: 1.6rem; color: var(--silver-bright);
      margin-bottom: 0.5rem;
    }
    .reset-card p.lead { color: var(--muted); font-size: 0.88rem; margin-bottom: 1.4rem; line-height: 1.7; }
    .reset-card .auth-form { display: block; }
    .reset-back {
      display: inline-block; margin-top: 1.2rem;
      font-size: 0.78rem; color: var(--muted); text-decoration: none;
    }
    .reset-back:hover { color: var(--blue-light); }
  </style>
</head>
<body>
  <div class="reset-wrap">
    <div class="reset-card">
      <h1>Reset your password</h1>
      <p class="lead" id="resetLead">Enter a new password below. You'll be signed in once it's saved.</p>

      <form class="auth-form" id="resetForm" autocomplete="on" novalidate>
        <div class="fg">
          <label for="rpPw">New password</label>
          <input id="rpPw" name="password" type="password" autocomplete="new-password" placeholder="Min 8 chars" required minlength="8">
        </div>
        <div class="fg">
          <label for="rpPw2">Confirm new password</label>
          <input id="rpPw2" name="password2" type="password" autocomplete="new-password" placeholder="Repeat password" required minlength="8">
        </div>
        <div class="auth-err" id="resetErr" role="alert"></div>
        <div class="auth-info" id="resetInfo" role="status"></div>
        <button type="submit" class="auth-submit">Update password →</button>
      </form>
      <a href="index.html" class="reset-back">← Back to homepage</a>
    </div>
  </div>

  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <script src="auth-config.js"></script>
  <script src="auth.js"></script>
  <script>
  (function () {
    const form = document.getElementById('resetForm');
    const err  = document.getElementById('resetErr');
    const info = document.getElementById('resetInfo');
    const lead = document.getElementById('resetLead');
    const auth = window.haseebAuth;

    function showInfo(msg) { info.textContent = msg; info.classList.toggle('show', !!msg); }

    if (!auth?.ready) {
      err.textContent = 'Sign-in is not configured. Please try again later.';
      form.querySelector('button').disabled = true;
      return;
    }

    // Supabase parses the recovery token from the URL automatically and emits
    // a PASSWORD_RECOVERY event. Until we receive a session, block submission.
    let recoveryReady = false;
    auth.onChange((user) => {
      if (user) {
        recoveryReady = true;
        lead.textContent = `Signed in as ${user.email}. Enter a new password below.`;
      }
    });
    // Also accept an existing session (in case event already fired)
    auth.getUser().then((u) => { if (u) recoveryReady = true; });

    form.addEventListener('submit', async (e) => {
      e.preventDefault();
      err.textContent = ''; showInfo('');
      const pw  = document.getElementById('rpPw').value;
      const pw2 = document.getElementById('rpPw2').value;
      if (pw.length < 8)  return err.textContent = 'Password must be at least 8 characters.';
      if (pw !== pw2)     return err.textContent = 'Passwords do not match.';
      if (!recoveryReady) return err.textContent = 'Reset link not detected. Open this page from the email link.';

      const btn = form.querySelector('button');
      btn.disabled = true; btn.textContent = 'Updating…';
      try {
        await auth.updatePassword(pw);
        showInfo('Password updated. Redirecting to homepage…');
        setTimeout(() => { location.href = 'index.html'; }, 1500);
      } catch (e2) {
        err.textContent = e2?.message || 'Could not update password.';
        btn.disabled = false; btn.textContent = 'Update password →';
      }
    });
  })();
  </script>
</body>
</html>
